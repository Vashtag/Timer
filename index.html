<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomy Lab — Station Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --border:  #222;
      --text:    #e2e2e2;
      --muted:   #555;
      --dimmed:  #2e2e2e;
      --gold:    #c9a96e;
      --danger:  #d4645a;
      --r:       6px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SETUP ────────────────────────────────── */
    #screen-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wordmark {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3.5rem;
    }

    .field-label {
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .session-options {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.8rem;
    }

    .opt-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      cursor: pointer;
      border-radius: var(--r);
      transition: border-color 0.15s, color 0.15s;
      -webkit-appearance: none;
    }

    .opt-btn:hover {
      border-color: #3a3a3a;
      color: var(--text);
    }

    .opt-btn.selected {
      border-color: var(--gold);
      color: var(--gold);
    }

    .preview-text {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: #3a3a3a;
      margin-bottom: 2.8rem;
      min-height: 1.1em;
      text-align: center;
    }

    .start-btn {
      background: var(--gold);
      color: #0d0d0d;
      border: none;
      padding: 0.85rem 3.2rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--r);
      transition: opacity 0.15s;
      -webkit-appearance: none;
    }

    .start-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .start-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    /* ── TIMER ────────────────────────────────── */
    #screen-timer {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 540px;
      padding: 2rem;
    }

    .phase-tag {
      font-size: 0.62rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
      transition: color 0.4s;
    }

    .phase-tag.packup {
      color: var(--danger);
      opacity: 0.85;
    }

    .clock {
      font-size: clamp(5.5rem, 20vw, 9.5rem);
      font-weight: 100;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      transition: color 0.4s;
      margin-bottom: 2.8rem;
    }

    .clock.urgent {
      color: var(--danger);
    }

    /* Progress bar */
    .track {
      width: 100%;
      height: 1px;
      background: var(--border);
      position: relative;
      margin-bottom: 1.8rem;
      border-radius: 1px;
      overflow: hidden;
    }

    .track-fill {
      position: absolute;
      inset: 0 auto 0 0;
      background: var(--gold);
      transition: width 0.85s linear;
    }

    .track-fill.packup-fill {
      background: var(--danger);
      transition: width 0.85s linear, background 0.4s;
    }

    /* Station dots */
    .dots {
      display: flex;
      gap: 10px;
      margin-bottom: 2.8rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dimmed);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: var(--gold);
      transform: scale(1.35);
    }

    .dot.done {
      background: var(--border);
    }

    .dot.all-done {
      background: #3a3a3a;
    }

    .end-note {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    /* ── SETTINGS ────────────────────────────── */
    #settings-btn {
      position: fixed;
      bottom: 1.6rem;
      right: 1.6rem;
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.4;
      padding: 0;
      -webkit-appearance: none;
      z-index: 10;
    }

    #settings-btn:hover {
      border-color: var(--muted);
      opacity: 1;
    }

    #settings-btn svg {
      width: 14px;
      height: 14px;
      fill: var(--muted);
      transition: fill 0.15s;
    }

    #settings-btn:hover svg {
      fill: var(--text);
    }

    #settings-panel {
      position: fixed;
      bottom: 4rem;
      right: 1.6rem;
      background: #161616;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.2rem 1.4rem;
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 10;
      min-width: 220px;
    }

    #settings-panel.open {
      display: flex;
    }

    .settings-title {
      font-size: 0.58rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .test-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.55rem 0.9rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      border-radius: var(--r);
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
      -webkit-appearance: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .test-btn:hover {
      border-color: var(--gold);
      color: var(--text);
    }

    .test-btn .dot-icon {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .test-btn.final-btn .dot-icon {
      background: var(--danger);
    }

    .settings-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.5rem 0 0.2rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.2rem;
    }

    .settings-row-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      white-space: nowrap;
    }

    .pill-group {
      display: flex;
      gap: 0.3rem;
    }

    .pill-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.28rem 0.6rem;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 4px;
      transition: border-color 0.15s, color 0.15s;
      -webkit-appearance: none;
      white-space: nowrap;
    }

    .pill-btn:hover {
      border-color: #3a3a3a;
      color: var(--text);
    }

    .pill-btn.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── FLASH OVERLAY ────────────────────────── */
    #flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    #flash.go {
      animation: flashpulse 0.55s ease-out forwards;
    }

    #flash.go-final {
      animation: flashpulse-final 0.55s ease-out forwards;
    }

    @keyframes flashpulse {
      0%   { opacity: 1; background: rgba(201,169,110,0.14); }
      100% { opacity: 0; background: rgba(201,169,110,0.14); }
    }

    @keyframes flashpulse-final {
      0%   { opacity: 1; background: rgba(212,100,90,0.14); }
      100% { opacity: 0; background: rgba(212,100,90,0.14); }
    }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- ── SETTINGS ───────────────────────────────── -->
<button id="settings-btn" onclick="toggleSettings()" title="Sound settings">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.81c.21-.16.27-.45.13-.69l-2.2-3.81c-.13-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.19-.8-1.86-1.08L14 2.42c-.04-.27-.28-.42-.54-.42h-4.4c-.26 0-.5.15-.54.42l-.41 2.47c-.67.28-1.28.64-1.86 1.08l-2.74-1.1c-.24-.09-.53 0-.66.24l-2.2 3.81c-.14.24-.08.53.13.69l2.32 1.81c-.04.34-.07.7-.07 1.08s.03.74.07 1.08L2.3 14.4c-.21.16-.27.45-.13.69l2.2 3.81c.13.24.42.32.66.24l2.74-1.1c.57.44 1.19.8 1.86 1.08l.41 2.47c.04.27.28.42.54.42h4.4c.26 0 .5-.15.54-.42l.41-2.47c.67-.28 1.28-.64 1.86-1.08l2.74 1.1c.24.09.53 0 .66-.24l2.2-3.81c.14-.24.08-.53-.13-.69l-2.32-1.81z"/>
  </svg>
</button>

<div id="settings-panel">
  <p class="settings-title">Sound test</p>
  <button class="test-btn" onclick="testRotation()">
    <span class="dot-icon"></span>Rotation ding
  </button>
  <button class="test-btn final-btn" onclick="testFinal()">
    <span class="dot-icon"></span>Final ding
  </button>

  <hr class="settings-divider">
  <p class="settings-title">Session</p>

  <div class="settings-row">
    <span class="settings-row-label">Stations</span>
    <div class="pill-group">
      <button class="pill-btn" data-stations="4" onclick="setStations(4, this)">4</button>
      <button class="pill-btn active" data-stations="5" onclick="setStations(5, this)">5</button>
    </div>
  </div>

  <div class="settings-row">
    <span class="settings-row-label">Duration</span>
    <div class="pill-group">
      <button class="pill-btn" data-mins="60" onclick="setSessionMins(60, this)">60 min</button>
      <button class="pill-btn active" data-mins="90" onclick="setSessionMins(90, this)">90 min</button>
    </div>
  </div>
</div>

<!-- ── SETUP ──────────────────────────────────── -->
<div id="screen-setup">
  <p class="wordmark">School of Anatomy &mdash; Lab Timer</p>
  <p class="field-label">Session start</p>
  <div class="session-options">
    <button class="opt-btn" data-h="11" data-m="30" onclick="pickSession(this)">11:30 am</button>
    <button class="opt-btn" data-h="13" data-m="0"  onclick="pickSession(this)">1:00 pm</button>
  </div>
  <p class="preview-text" id="preview">&nbsp;</p>
  <button class="start-btn" id="startBtn" disabled onclick="beginSession()">Start Timer</button>
</div>

<!-- ── TIMER ──────────────────────────────────── -->
<div id="screen-timer">
  <p class="phase-tag" id="phaseTag">Station Time</p>
  <div class="clock" id="clock">00:00</div>
  <div class="track"><div class="track-fill" id="trackFill" style="width:0%"></div></div>
  <div class="dots" id="dots"></div>
  <p class="end-note" id="endNote"></p>
</div>

<script>
/* ── Constants ─────────────────────────────── */
const PACKUP_SECS = 600; // 10 min

/* ── Session config (overridable via settings) */
let STATIONS     = 5;
let SESSION_MINS = 90;

/* ── Audio ─────────────────────────────────── */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, startT, dur, vol = 0.55, type = 'sine') {
  const osc = AC.createOscillator();
  const env = AC.createGain();
  osc.connect(env);
  env.connect(AC.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  env.gain.setValueAtTime(vol, startT);
  env.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
  osc.start(startT);
  osc.stop(startT + dur + 0.05);
}

// Station rotation: two ascending tones
function playRotation() {
  const t = AC.currentTime;
  beep(880,  t,        1.8, 0.55);
  beep(1320, t + 0.18, 1.4, 0.40);
}

// Session complete / pack-up: three descending tones, clearly different
function playFinal() {
  const t = AC.currentTime;
  beep(1046, t,        1.2, 0.65);
  beep(880,  t + 0.45, 1.2, 0.65);
  beep(659,  t + 0.90, 2.2, 0.65);
}

function triggerFlash(isFinal) {
  const el = document.getElementById('flash');
  el.className = '';
  // Force reflow so animation restarts
  void el.offsetWidth;
  el.className = isFinal ? 'go-final' : 'go';
}

/* ── State ─────────────────────────────────── */
let selH = null, selM = null;
let sessionEnd    = null; // Date: absolute session end
let stationSecs   = 0;   // seconds per station (integer)
let curStation    = 0;   // 0-indexed, 0–4
let stationEnd    = null; // Date: end of current station slot
let inPackup      = false;
let ticker        = null;

/* ── Setup screen ──────────────────────────── */
function pickSession(btn) {
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selH = +btn.dataset.h;
  selM = +btn.dataset.m;
  refreshPreview();
  document.getElementById('startBtn').disabled = false;
}

function calcSessionEnd() {
  const d = new Date();
  d.setHours(selH, selM, 0, 0);
  return new Date(d.getTime() + SESSION_MINS * 60 * 1000);
}

function refreshPreview() {
  const now    = new Date();
  const end    = calcSessionEnd();
  const left   = (end - now) / 1000;
  const stSecs = Math.floor((left - PACKUP_SECS) / STATIONS);
  const el     = document.getElementById('preview');

  if (stSecs < 30) {
    el.textContent = 'Session time has elapsed';
  } else {
    el.textContent =
      `≈ ${fmt(stSecs)} per station if started now`;
  }
}

/* ── Begin ─────────────────────────────────── */
function beginSession() {
  if (selH === null) return;
  AC.resume();

  const now  = new Date();
  sessionEnd = calcSessionEnd();
  const left = (sessionEnd - now) / 1000;
  stationSecs = Math.floor((left - PACKUP_SECS) / STATIONS);

  if (stationSecs < 30) {
    alert('Not enough time remaining. Please check the session start time.');
    return;
  }

  curStation = 0;
  inPackup   = false;
  stationEnd = new Date(now.getTime() + stationSecs * 1000);

  // Build dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < STATIONS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = `d${i}`;
    dotsEl.appendChild(d);
  }

  const stationsEnd = new Date(sessionEnd.getTime() - PACKUP_SECS * 1000);
  document.getElementById('endNote').textContent =
    `Stations end ${fmtTime(stationsEnd)}  ·  ${fmt(stationSecs)} per station`;

  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-timer').style.display = 'flex';

  tick();
  ticker = setInterval(tick, 400);
}

/* ── Tick ───────────────────────────────────── */
function tick() {
  const now     = new Date();
  const sesLeft = (sessionEnd - now) / 1000;

  // Session fully over
  if (sesLeft <= 0) {
    clearInterval(ticker);
    document.getElementById('clock').textContent = '00:00';
    document.getElementById('phaseTag').textContent = 'Session Complete';
    document.getElementById('trackFill').style.width = '100%';
    return;
  }

  // Pack-up phase
  if (inPackup) {
    renderPackup(sesLeft);
    return;
  }

  // Check if current station ended
  const stLeft = (stationEnd - now) / 1000;

  if (stLeft <= 0) {
    curStation++;

    if (curStation >= STATIONS) {
      // All 5 stations done → final ding → pack up
      inPackup = true;
      playFinal();
      triggerFlash(true);
      allDotsDone();
      renderPackup(sesLeft);
      return;
    }

    // Rotation ding
    playRotation();
    triggerFlash(false);
    stationEnd = new Date(stationEnd.getTime() + stationSecs * 1000);
    updateDots();
  }

  // Render station countdown
  const remaining = Math.max(0, (stationEnd - now) / 1000);
  const progress  = 1 - remaining / stationSecs;

  document.getElementById('clock').textContent = fmt(remaining);
  document.getElementById('clock').classList.toggle('urgent', remaining < 60);
  document.getElementById('trackFill').style.width = (progress * 100).toFixed(2) + '%';
  document.getElementById('trackFill').classList.remove('packup-fill');
  document.getElementById('phaseTag').textContent = 'Station Time';
  document.getElementById('phaseTag').classList.remove('packup');
}

function renderPackup(sesLeft) {
  const progress = 1 - sesLeft / PACKUP_SECS;
  document.getElementById('clock').textContent = fmt(sesLeft);
  document.getElementById('clock').classList.toggle('urgent', sesLeft < 60);
  document.getElementById('trackFill').style.width = (Math.min(1, progress) * 100).toFixed(2) + '%';
  document.getElementById('trackFill').classList.add('packup-fill');
  document.getElementById('phaseTag').textContent = 'Pack Up & Wash Hands';
  document.getElementById('phaseTag').classList.add('packup');
}

/* ── Dot helpers ───────────────────────────── */
function updateDots() {
  for (let i = 0; i < STATIONS; i++) {
    const el = document.getElementById(`d${i}`);
    if (!el) continue;
    el.className =
      i < curStation  ? 'dot done'   :
      i === curStation ? 'dot active' : 'dot';
  }
}

function allDotsDone() {
  for (let i = 0; i < STATIONS; i++) {
    const el = document.getElementById(`d${i}`);
    if (el) el.className = 'dot all-done';
  }
}

/* ── Formatters ────────────────────────────── */
function fmt(secs) {
  const s = Math.max(0, Math.round(secs));
  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

function fmtTime(date) {
  return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

/* ── Settings panel ────────────────────────── */
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
}

// Close panel when clicking outside
document.addEventListener('click', function(e) {
  const panel = document.getElementById('settings-panel');
  const btn   = document.getElementById('settings-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

function testRotation() {
  AC.resume().then(() => {
    playRotation();
    triggerFlash(false);
  });
}

function testFinal() {
  AC.resume().then(() => {
    playFinal();
    triggerFlash(true);
  });
}

/* ── Session config setters ────────────────── */
function setStations(n, btn) {
  STATIONS = n;
  document.querySelectorAll('[data-stations]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshPreview();
}

function setSessionMins(m, btn) {
  SESSION_MINS = m;
  document.querySelectorAll('[data-mins]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshPreview();
}
</script>
</body>
</html>
